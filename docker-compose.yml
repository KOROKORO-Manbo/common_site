services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=mypostgre
      - POSTGRES_USER=fujiman
      - POSTGRES_PASSWORD=Tomiyasu55
    ports:
      - "5432:5432"

  web:
    build: .  # 同じフォルダにあるDockerfileを使う
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/code  # ローカルの変更を即座に反映させる（ボリュームマウント）
    ports:
      - "8080:8000"
    depends_on:
      - db        # 上の db: のこと

volumes:
  postgres_data: